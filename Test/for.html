<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <p>这是九九乘法表：</p>
    <script>
        // 打印九九乘法表
        for (let i = 1; i <= 9; i++) {
            document.write("<br> <br>");
            for (let j = 1; j <= i; j++) {
            document.write(j + "*" + i + "=" + (i * j) + "&emsp;");
            }
        }
    </script>

    <script>
        document.write("<br> <br>")
        for(let i = 1; i <= 9; i++) {
            let output = [];
            for(let j=1; j <= i; j++) {
                output.push(`${j} * ${i} = ${j * i}`);
            }
            document.write("<br>", output.join('&emsp;'), "<br>")
        }
    </script>
</body>

</html>
